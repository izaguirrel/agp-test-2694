# Sonatype Guide — Agentic Patches Configuration
version: "1"

ignore:
  paths:
    - "**/node_modules/**"
    - "**/.git/**"
  packages: []

agent:
  enabled: true
  provider: anthropic
  model: claude-sonnet-4-5
  maxFixAttempts: 3
  timeout: 30m

validation:
  enabled: false

pr:
  labels:
    - dependencies
    - automated

limits:
  maxOpenPRs: 5
  maxPRsPerRun: 10
